name: Quality Gate

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  quality-check:
    name: quality-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run quality gate
        run: npm run -s quality:check
