name: Dependency Audit

on:
  # 每周一早上 8 点自动运行
  schedule:
    - cron: '0 0 * * 1'

  # PR 时运行
  pull_request:
    branches:
      - main
      - develop

  # 允许手动触发
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true
          echo "## Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Check for critical vulnerabilities (production deps)
        run: |
          # 仅阻断生产依赖中的 critical 漏洞；high 级别保留告警但不阻断
          AUDIT_RESULT=$(npm audit --omit=dev --audit-level=critical --json || true)
          HIGH=$(echo "$AUDIT_RESULT" | jq -r '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo "0")
          CRITICAL=$(echo "$AUDIT_RESULT" | jq -r '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo "0")

          if ! [[ "$HIGH" =~ ^[0-9]+$ ]]; then
            HIGH=0
          fi
          if ! [[ "$CRITICAL" =~ ^[0-9]+$ ]]; then
            CRITICAL=0
          fi

          {
            echo "## Production Vulnerability Gate"
            echo "- High: $HIGH"
            echo "- Critical: $CRITICAL"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities in production dependencies"
            echo "Please run 'npm audit fix --omit=dev' to resolve issues"
            exit 1
          fi

          echo "✅ No critical vulnerabilities found in production dependencies"
