name: Dependency Audit

on:
  # 每周一早上 8 点自动运行
  schedule:
    - cron: '0 0 * * 1'

  # PR 时运行
  pull_request:
    branches:
      - main
      - develop

  # 允许手动触发
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run technical debt regression gate
        run: |
          echo "## Technical Debt Regression Gate" >> "$GITHUB_STEP_SUMMARY"
          npm run -s debt:check | tee /tmp/tech-debt-check.log
          cat /tmp/tech-debt-check.log >> "$GITHUB_STEP_SUMMARY"

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true
          echo "## Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Check for critical vulnerabilities (production deps)
        run: |
          # 仅阻断生产依赖中的 critical 漏洞；high 级别保留告警但不阻断
          AUDIT_RESULT=$(npm audit --omit=dev --json || true)
          HIGH=$(echo "$AUDIT_RESULT" | jq -r '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo "0")
          CRITICAL=$(echo "$AUDIT_RESULT" | jq -r '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo "0")

          if ! [[ "$HIGH" =~ ^[0-9]+$ ]]; then
            HIGH=0
          fi
          if ! [[ "$CRITICAL" =~ ^[0-9]+$ ]]; then
            CRITICAL=0
          fi

          {
            echo "## Production Vulnerability Gate"
            echo "- High: $HIGH"
            echo "- Critical: $CRITICAL"
          } >> "$GITHUB_STEP_SUMMARY"

          # 输出 high/critical 直连依赖清单，便于追踪修复进度
          printf '%s' "$AUDIT_RESULT" > /tmp/runtime-audit.json
          node -e "
            const fs = require('fs');
            const p = '/tmp/runtime-audit.json';
            const raw = fs.readFileSync(p, 'utf8');
            const j = JSON.parse(raw);
            const vul = j.vulnerabilities || {};
            const rows = [];
            for (const [name, item] of Object.entries(vul)) {
              if (!item || !item.isDirect) continue;
              if (item.severity === 'high' || item.severity === 'critical') {
                rows.push({ name, sev: item.severity, range: item.range || '' });
              }
            }
            rows.sort((a, b) => (a.sev === b.sev ? a.name.localeCompare(b.name) : a.sev === 'critical' ? -1 : 1));
            console.log('### Direct Runtime High/Critical Packages');
            if (rows.length === 0) {
              console.log('- none');
            } else {
              for (const r of rows) {
                console.log('- ' + r.sev + ': ' + r.name + (r.range ? ' (`' + r.range + '`)' : ''));
              }
            }
          " >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities in production dependencies"
            echo "Please run 'npm audit fix --omit=dev' to resolve issues"
            exit 1
          fi

          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::Found $HIGH high vulnerabilities in production dependencies (not blocking)."
          fi

          echo "✅ No critical vulnerabilities found in production dependencies"
