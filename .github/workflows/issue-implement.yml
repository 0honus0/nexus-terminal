name: Issue Implement

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: issue-implement-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    name: Send implement request
    if: ${{ !github.event.issue.pull_request && contains(github.event.comment.body, '/codex implement') }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          ORCHESTRATOR_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
        run: |
          test -n "$ORCHESTRATOR_URL" || { echo "Missing secret: ORCHESTRATOR_URL"; exit 1; }
          test -n "$ORCHESTRATOR_TOKEN" || { echo "Missing secret: ORCHESTRATOR_TOKEN"; exit 1; }

      - name: Send implement event payload
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          ORCHESTRATOR_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ACTION_NAME: ${{ github.event.action }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENTER: ${{ github.actor }}
          DELIVERY: ${{ github.run_id }}-${{ github.run_attempt }}
          JSON_PAYLOAD: ${{ toJson(github.event) }}
        run: |
          curl --fail --show-error --silent \
            -X POST "${ORCHESTRATOR_URL}/github/implement" \
            -H "Authorization: Bearer ${ORCHESTRATOR_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Repository: ${REPOSITORY}" \
            -H "X-GitHub-Event: ${EVENT_NAME}" \
            -H "X-GitHub-Action: ${ACTION_NAME}" \
            -H "X-Issue-Number: ${ISSUE_NUMBER}" \
            -H "X-Issue-Url: ${ISSUE_HTML_URL}" \
            -H "X-Issue-Title: ${ISSUE_TITLE}" \
            -H "X-Comment-Url: ${COMMENT_URL}" \
            -H "X-Commenter: ${COMMENTER}" \
            -H "X-Delivery-Id: ${DELIVERY}" \
            --data-binary "${JSON_PAYLOAD}"

      - name: Log success
        run: |
          echo "Implement request for issue #${{ github.event.issue.number }} sent."